name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ipa:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Create Recipe Database
        run: python3 scripts/create_db.py

      - name: Download Gemma 4 Model (bundled into IPA)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip3 install -q huggingface_hub
          python3 - << 'EOF'
          import os, sys
          from huggingface_hub import snapshot_download
          token = os.environ.get("HF_TOKEN") or None
          print(f"Downloading model ({'with token' if token else 'anonymous'})...")
          snapshot_download(
              repo_id="mlx-community/gemma-4-e2b-it-4bit",
              local_dir="Sources/HealthDiary/Resources/model",
              token=token,
              ignore_patterns=["*.md", "*.txt", "LICENSE*", ".gitattributes"],
          )
          print("Model downloaded successfully")
          EOF

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project HealthDiary.xcodeproj \
            -scheme HealthDiary

      - name: Build for iOS Device (unsigned)
        run: |
          BUILD_DIR="$(pwd)/build-device"
          set -o pipefail
          xcodebuild build \
            -project HealthDiary.xcodeproj \
            -scheme HealthDiary \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SKIP_INSTALL=NO \
            BUILD_DIR="$BUILD_DIR" \
            2>&1 | tee build.log || (cat build.log && exit 1)

      - name: Package IPA
        run: |
          BUILD_DIR="$(pwd)/build-device"
          APP="$BUILD_DIR/Debug-iphoneos/HealthDiary.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: HealthDiary.app not found at $APP"
            ls -la "$BUILD_DIR/" 2>/dev/null || true
            exit 1
          fi
          echo "Found: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/HealthDiary.app
          zip -qr HealthDiary.ipa Payload/
          rm -rf Payload
          echo "IPA size: $(du -sh HealthDiary.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HealthDiary-unsigned
          path: HealthDiary.ipa
          retention-days: 30
