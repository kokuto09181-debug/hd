name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      # --- キャッシュ ---
      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-xcodegen
          restore-keys: ${{ runner.os }}-brew-

      # --- Xcode 選択 ---
      # FoundationModels は Xcode 26 以降が必要。
      # ランナーに Xcode 26 以降があれば選択し、なければ既定のまま。
      # コード側も #if canImport(FoundationModels) で保護済みのため
      # Xcode 16.x でも必ずコンパイルが通る。
      - name: Select latest available Xcode
        run: |
          LATEST=$(ls /Applications/ | grep -E "^Xcode_[0-9]" | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "/Applications/${LATEST}/Contents/Developer"
            echo "Selected Xcode: $LATEST"
          fi
          xcodebuild -version

      # --- セットアップ ---
      - name: Install tools
        run: |
          brew install xcodegen || true
          gem install xcpretty --no-document 2>/dev/null || true

      - name: Create Recipe Database
        run: python3 scripts/create_db.py

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project HealthDiary.xcodeproj \
            -scheme HealthDiary \
            -onlyUsePackageVersionsFromResolvedFile 2>/dev/null || \
          xcodebuild -resolvePackageDependencies \
            -project HealthDiary.xcodeproj \
            -scheme HealthDiary

      # --- ビルド ---
      - name: Build (simulator)
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project HealthDiary.xcodeproj \
            -scheme HealthDiary \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee build.log | xcpretty || {
              echo "=== Build Log (last 100 lines) ==="
              tail -100 build.log
              exit 1
            }

      # --- テスト ---
      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project HealthDiary.xcodeproj \
            -scheme HealthDiaryTests \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcpretty || true   # テスト自体のエラーは許容
