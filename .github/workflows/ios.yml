name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Create Recipe Database
        run: python3 scripts/create_db.py

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project HealthDiary.xcodeproj \
            -scheme HealthDiary

      - name: Build
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project HealthDiary.xcodeproj \
            -scheme HealthDiary \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild clean build \
              -project HealthDiary.xcodeproj \
              -scheme HealthDiary \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              -skipMacroValidation \
              CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project HealthDiary.xcodeproj \
            -scheme HealthDiaryTests \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
