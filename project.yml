name: HealthDiary
options:
  bundleIdPrefix: com.healthdiary
  deploymentTarget:
    iOS: "17.0"

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    exactVersion: "3.31.3"


targets:
  HealthDiary:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/HealthDiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthdiary.app
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Sources/HealthDiary/Info.plist
    entitlements:
      path: Sources/HealthDiary/HealthDiary.entitlements
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace

  HealthDiaryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/HealthDiaryTests
    dependencies:
      - target: HealthDiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthdiary.app.tests
