name: HealthDiary
options:
  bundleIdPrefix: com.healthdiary
  deploymentTarget:
    iOS: "18.1"

targets:
  HealthDiary:
    type: application
    platform: iOS
    deploymentTarget: "18.1"
    sources:
      - path: Sources/HealthDiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthdiary.app
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Sources/HealthDiary/Info.plist
    entitlements:
      path: Sources/HealthDiary/HealthDiary.entitlements
    # 外部パッケージ不要 — FoundationModels はOS組み込み

  HealthDiaryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/HealthDiaryTests
    dependencies:
      - target: HealthDiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthdiary.app.tests
